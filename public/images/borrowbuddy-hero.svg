<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0E13" />
      <stop offset="50%" stop-color="#0F1724" />
      <stop offset="100%" stop-color="#101D2E" />
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 220) rotate(45) scale(520 420)">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1250 760) rotate(45) scale(540 460)">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0B1220" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)" />
  <rect width="1600" height="1000" fill="url(#glow1)" />
  <rect width="1600" height="1000" fill="url(#glow2)" />
  <rect width="1600" height="1000" fill="url(#grid)" />

  <g opacity="0.9">
    <rect x="500" y="110" width="600" height="780" rx="48" fill="url(#card)" stroke="white" stroke-opacity="0.08" stroke-width="2" />
    <rect x="540" y="160" width="520" height="80" rx="20" fill="#101726" stroke="white" stroke-opacity="0.06" />
    <rect x="540" y="260" width="520" height="90" rx="20" fill="#0E1523" stroke="white" stroke-opacity="0.06" />
    <rect x="540" y="370" width="520" height="90" rx="20" fill="#0E1523" stroke="white" stroke-opacity="0.06" />
    <rect x="540" y="480" width="520" height="90" rx="20" fill="#0E1523" stroke="white" stroke-opacity="0.06" />
    <rect x="540" y="590" width="520" height="90" rx="20" fill="#0E1523" stroke="white" stroke-opacity="0.06" />
    <rect x="540" y="700" width="520" height="90" rx="20" fill="#0E1523" stroke="white" stroke-opacity="0.06" />
    <rect x="560" y="180" width="180" height="16" rx="8" fill="url(#accent)" />
    <rect x="560" y="300" width="240" height="14" rx="7" fill="white" fill-opacity="0.4" />
    <rect x="560" y="410" width="280" height="14" rx="7" fill="white" fill-opacity="0.35" />
    <rect x="560" y="520" width="200" height="14" rx="7" fill="white" fill-opacity="0.35" />
    <rect x="560" y="630" width="260" height="14" rx="7" fill="white" fill-opacity="0.35" />
    <rect x="560" y="740" width="220" height="14" rx="7" fill="white" fill-opacity="0.35" />
  </g>

  <g>
    <text x="140" y="240" fill="white" font-family="Outfit, Arial, sans-serif" font-size="48" font-weight="600" letter-spacing="4">
      BorrowBuddy
    </text>
    <text x="140" y="295" fill="white" font-family="Instrument Sans, Arial, sans-serif" font-size="20" font-weight="400" opacity="0.7">
      Smart loan tracking with reminders, QR sharing, and history insights.
    </text>
    <rect x="140" y="335" width="260" height="2" fill="url(#accent)" opacity="0.8" />
  </g>
</svg>
